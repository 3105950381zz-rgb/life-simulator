<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>随机人生模拟器</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fef7f2;--card:rgba(255,255,255,.75);--text:#3d2c2e;--text2:rgba(61,44,46,.5);
  --border:rgba(248,180,217,.25);--glow1:rgba(248,180,217,.15);--glow2:rgba(184,230,200,.15);
  --accent:#f8b4d9;--accent2:#b8e6c8;--accent3:#ffd6a5;--btn:#f8b4d9;--btn-hover:#f09bc8;
  --shadow:0 8px 32px rgba(248,180,217,.15);--tag-bg:rgba(248,180,217,.1);
}
.dark{
  --bg:#1a1a2e;--card:rgba(30,30,50,.8);--text:#e8e0e8;--text2:rgba(232,224,232,.4);
  --border:rgba(248,180,217,.12);--glow1:rgba(248,180,217,.08);--glow2:rgba(184,230,200,.08);
  --accent:#e8a0c0;--accent2:#90c8a0;--accent3:#e0b080;--btn:#e8a0c0;--btn-hover:#d090b0;
  --shadow:0 8px 32px rgba(0,0,0,.3);--tag-bg:rgba(232,160,192,.1);
}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .4s,color .4s}
/* ===== PARTICLES ===== */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.pt{position:absolute;border-radius:50%;opacity:0;animation:ptFloat linear infinite}
@keyframes ptFloat{0%{transform:translateY(100vh) scale(0);opacity:0}5%{opacity:.6}90%{opacity:.6}100%{transform:translateY(-10vh) scale(1);opacity:0}}
/* ===== GLOW ===== */
.glow{position:fixed;border-radius:50%;z-index:0;pointer-events:none;transition:background .4s}
.g1{width:500px;height:500px;top:-15%;left:-10%;background:radial-gradient(circle,var(--glow1),transparent 70%);animation:float1 20s ease-in-out infinite}
.g2{width:400px;height:400px;bottom:-10%;right:-5%;background:radial-gradient(circle,var(--glow2),transparent 70%);animation:float2 25s ease-in-out infinite}
.g3{width:300px;height:300px;top:40%;right:-5%;background:radial-gradient(circle,rgba(255,214,165,.08),transparent 70%);animation:float3 15s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,-40px)}}
@keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-50px,60px)}}
@keyframes float3{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,30px)}}
/* ===== LAYOUT ===== */
.ct{position:relative;z-index:1;max-width:580px;margin:0 auto;padding:20px 16px 30px}
/* ===== THEME TOGGLE ===== */
.theme-toggle{position:fixed;top:16px;right:16px;z-index:100;width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;backdrop-filter:blur(8px)}
.theme-toggle:hover{transform:scale(1.1)}.theme-toggle:active{transform:scale(.95)}
/* ===== HOME ===== */
.home{text-align:center;padding:40px 0;position:relative}
.home-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:999px;font-size:11px;font-weight:600;background:var(--tag-bg);color:var(--accent);letter-spacing:1px;border:1px solid var(--border);margin-bottom:14px}
.home h1{font-size:34px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2;margin-bottom:6px}
.dark .home h1{background:linear-gradient(135deg,#e8a0c0,#90c8a0,#e0b080);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.home .sub{font-size:13px;color:var(--text2);letter-spacing:3px;margin-bottom:36px}
/* ===== CARDS PICK ===== */
.pick-hint{font-size:13px;color:var(--text2);margin-bottom:20px;letter-spacing:2px}
.card-row{display:flex;gap:12px;justify-content:center;margin-bottom:30px}
.pick-card{width:130px;height:180px;border-radius:16px;cursor:pointer;position:relative;transition:all .35s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;perspective:600px;border:2px solid var(--border);background:transparent;font-family:inherit}
.pick-card .cf,.pick-card .cb{position:absolute;inset:0;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;backface-visibility:hidden;transition:all .5s cubic-bezier(.4,0,.2,1)}
.pick-card .cf{background:linear-gradient(145deg,var(--accent),var(--accent2));color:#fff;z-index:2}
.pick-card .cf .q{font-size:36px;margin-bottom:6px}
.pick-card .cf .l{font-size:12px;font-weight:600;letter-spacing:2px}
.pick-card .cb{background:var(--card);transform:rotateY(180deg);border:2px solid var(--accent);z-index:1}
.pick-card .cb .q{font-size:40px;margin-bottom:6px}
.pick-card .cb .l{font-size:13px;font-weight:600;color:var(--accent)}
.pick-card.flipped .cf{transform:rotateY(180deg);z-index:1}
.pick-card.flipped .cb{transform:rotateY(0deg);z-index:2}
.pick-card:not(.flipped):hover{transform:translateY(-8px);box-shadow:0 12px 40px rgba(248,180,217,.25)}
.pick-card:not(.flipped):active{transform:scale(.95)}
.pick-card.chosen{transform:scale(1.08);border-color:var(--accent);box-shadow:0 0 30px rgba(248,180,217,.3)}
.pick-card.dim{opacity:.3;transform:scale(.9)}
/* ===== STEP ===== */
.step-view{display:none}
.step-counter{text-align:center;font-size:11px;color:var(--text2);letter-spacing:3px;margin-bottom:6px}
.step-bar{height:3px;border-radius:2px;background:var(--border);overflow:hidden;margin-bottom:24px}
.step-bar-in{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .6s ease;width:0%}
.step-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 22px;backdrop-filter:blur(12px);box-shadow:var(--shadow);min-height:200px;opacity:0;transform:translateY(15px);transition:opacity .5s,transform .5s,background .4s}
.step-card.show{opacity:1;transform:translateY(0)}
.step-card .step-title{font-size:15px;font-weight:700;letter-spacing:2px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.step-card .step-title .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;animation:pulse-dot 1.5s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.step-card .step-content{font-size:15px;line-height:1.9;min-height:60px}
.step-card .step-content .hl{color:var(--accent);font-weight:600}
/* ===== TYPEWRITER ===== */
.tw-cursor::after{content:'▊';animation:twBlink .7s step-end infinite;color:var(--accent);font-size:12px;margin-left:2px}
@keyframes twBlink{0%,100%{opacity:1}50%{opacity:0}}
/* ===== NEXT BUTTON ===== */
.next-btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:18px}
.next-btn:active{transform:scale(.97)}
.next-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 16px rgba(248,180,217,.2)}
.next-primary:hover{box-shadow:0 6px 24px rgba(248,180,217,.3)}
/* ===== RESULT ===== */
.result-view{display:none}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:28px 22px;backdrop-filter:blur(12px);box-shadow:var(--shadow);overflow:hidden;opacity:0;transform:translateY(20px);transition:opacity .5s,transform .5s,background .4s}
.result-card.show{opacity:1;transform:translateY(0)}
.result-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3))}
.sec{margin-bottom:18px}.sec:last-child{margin-bottom:0}
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sec-hd .ico{font-size:16px}
.sec-hd .tt{font-size:13px;font-weight:700;color:var(--text);letter-spacing:1px}
.sec-hd .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.sec-body{font-size:13px;line-height:1.8;color:var(--text)}
.sec-body .hl{color:var(--accent);font-weight:600}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500;background:var(--tag-bg);color:var(--accent);border:1px solid var(--border)}
.tag.green{background:rgba(184,230,200,.1);color:var(--accent2)}
.story{padding:10px 12px;border-radius:10px;margin-bottom:6px;border-left:3px solid;font-size:12px;line-height:1.6}
.story:last-child{margin-bottom:0}
.story.good{border-color:var(--accent2);background:rgba(184,230,200,.04)}
.story.normal{border-color:var(--accent3);background:rgba(255,214,165,.04)}
.story.rough{border-color:var(--accent);background:rgba(248,180,217,.04)}
.story .s-badge{font-size:10px;font-weight:600;letter-spacing:1px;margin-bottom:2px;display:block}
.story.good .s-badge{color:var(--accent2)}
.story.normal .s-badge{color:var(--accent3)}
.story.rough .s-badge{color:var(--accent)}
.fortune-box{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;background:var(--tag-bg);border:1px solid var(--border)}
.fortune-icon{font-size:28px;flex-shrink:0}
.fortune-level{font-size:14px;font-weight:700}
.fortune-desc{font-size:11px;color:var(--text2);margin-top:2px}
.misc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.misc-item{padding:8px 10px;border-radius:8px;border:1px solid var(--border);text-align:center}
.misc-item .mi-label{font-size:9px;color:var(--text2);letter-spacing:1px;margin-bottom:2px}
.misc-item .mi-value{font-size:13px;font-weight:600}
.actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn{padding:12px 16px;border-radius:12px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;flex:1;min-width:0}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-second{background:var(--tag-bg);color:var(--text);border:1px solid var(--border)}
.btn-copy{background:rgba(184,230,200,.15);color:var(--accent2);border:1px solid rgba(184,230,200,.2)}
/* ===== RESULT HEADER ===== */
.result-hd{text-align:center;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.result-hd .rh-icon{font-size:42px;display:block;margin-bottom:6px}
.result-hd .rh-title{font-size:18px;font-weight:800;letter-spacing:1px}
.result-hd .rh-sub{font-size:11px;color:var(--text2);margin-top:4px;letter-spacing:2px}
/* ===== TOAST ===== */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 20px;border-radius:10px;background:var(--card);border:1px solid var(--border);font-size:13px;font-weight:500;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.1);z-index:999;opacity:0;transition:all .4s;backdrop-filter:blur(12px);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* ===== FOOTER ===== */
.ft{text-align:center;padding:24px 0 10px;font-size:10px;color:var(--text2);letter-spacing:1px;line-height:1.8;position:relative;z-index:1}
/* ===== RESPONSIVE ===== */
@media(max-width:480px){
  .home h1{font-size:27px}
  .pick-card{width:104px;height:148px}
  .pick-card .cf .q{font-size:28px}
  .pick-card .cf .l{font-size:10px}
  .card-row{gap:8px}
  .step-card{padding:20px 16px}
  .result-card{padding:20px 16px;border-radius:18px}
  .misc-grid{grid-template-columns:1fr}
  .actions{flex-direction:column}
  .theme-toggle{top:12px;right:12px;width:36px;height:36px;font-size:16px}
}
</style>
</head>
<body>

<div class="glow g1"></div>
<div class="glow g2"></div>
<div class="glow g3"></div>
<div id="particles"></div>

<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换主题">🌙</button>

<div class="ct" id="app">

  <!-- ===== HOME ===== -->
  <div id="homeView">
    <div class="home">
      <div class="home-badge">🎲 随机人生模拟器</div>
      <h1>你想过哪一种人生？</h1>
      <div class="sub">选一张命运之卡 · 开启你的人生剧本</div>

      <div class="pick-hint">👇 选一张你的命运卡牌</div>
      <div class="card-row" id="cardRow">
        <button class="pick-card" data-idx="0" onclick="pickCard(0)">
          <div class="cf"><span class="q">❓</span><span class="l">命运之潮</span></div>
          <div class="cb"><span class="q">🌊</span><span class="l">汹涌人生</span></div>
        </button>
        <button class="pick-card" data-idx="1" onclick="pickCard(1)">
          <div class="cf"><span class="q">❓</span><span class="l">命运之树</span></div>
          <div class="cb"><span class="q">🌿</span><span class="l">安稳人生</span></div>
        </button>
        <button class="pick-card" data-idx="2" onclick="pickCard(2)">
          <div class="cf"><span class="q">❓</span><span class="l">命运之星</span></div>
          <div class="cb"><span class="q">🌟</span><span class="l">璀璨人生</span></div>
        </button>
      </div>
      <div style="font-size:11px;color:var(--text2);letter-spacing:1px">点击卡牌，翻开你的命运</div>
    </div>
  </div>

  <!-- ===== STEP ===== -->
  <div class="step-view" id="stepView">
    <div class="step-counter" id="stepCounter">第 1 / 6 章</div>
    <div class="step-bar"><div class="step-bar-in" id="stepBar"></div></div>
    <div class="step-card" id="stepCard">
      <div class="step-title" id="stepTitle"><span class="dot"></span> 命运正在展开...</div>
      <div class="step-content" id="stepContent"></div>
      <button class="next-btn next-primary" id="nextBtn" onclick="nextStep()">下一章 →</button>
    </div>
  </div>

  <!-- ===== RESULT ===== -->
  <div class="result-view" id="resultView">
    <div id="capture-area">
      <div class="result-card" id="resultCard">
        <div id="cardContent"></div>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="restart()">🔄 重新抽取</button>
      <button class="btn btn-second" onclick="captureCard()">📸 保存截图</button>
      <button class="btn btn-copy" onclick="copyShare()">📋 复制文案</button>
    </div>
  </div>

  <div class="ft">🎲 随机人生模拟器 · 仅供娱乐 · 无现实参考意义</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== PARTICLES ====================
(function(){
  const c=document.getElementById('particles');
  for(let i=0;i<40;i++){const p=document.createElement('div');p.className='pt';const s=3+Math.random()*5;p.style.width=s+'px';p.style.height=s+'px';p.style.left=Math.random()*100+'%';p.style.background=['rgba(248,180,217,.4)','rgba(184,230,200,.4)','rgba(255,214,165,.4)','rgba(200,180,255,.4)'][Math.floor(Math.random()*4)];p.style.animationDuration=(10+Math.random()*20)+'s';p.style.animationDelay=Math.random()*15+'s';c.appendChild(p)}
})();

// ==================== UTILS ====================
function gR(arr){return arr[Math.floor(Math.random()*arr.length)]}
function gRN(arr,n){const pool=[...arr];const r=[];for(let i=0;i<n&&pool.length>0;i++){const idx=Math.floor(Math.random()*pool.length);r.push(pool[idx]);pool.splice(idx,1)}return r}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

// ==================== GENERATE ====================
let currentLife=null;
let chosenTone=null;
let stepData=[];

function genLife(toneIdx){
  const tone=TONES[toneIdx];
  const era=gR(D.era);
  const family=gR(D.family);
  const trait=gR(D.trait);
  const look=gR(D.look);
  const skills=gRN(D.skill,3);
  const job=gR(D.job);
  const sidejob=gR(D.sidejob);

  // Story selection with tone bias
  function pickStoryBias(arr){
    const roll=Math.random();
    let cutoff=0;
    for(const [type,weight] of Object.entries(tone.storyBias)){
      cutoff+=weight;
      if(roll<=cutoff){
        const pool=arr.filter(s=>s.type===type);
        if(pool.length>0)return gR(pool);
      }
    }
    return gR(arr);
  }
  const storyChild=pickStoryBias(D.storyChild);
  const storyMid=pickStoryBias(D.storyMid);
  const storyOld=pickStoryBias(D.storyOld);

  // Wealth with tone bias
  const wealthPool=tone.wealthBias.map(ico=>D.wealth.find(w=>w.ico===ico)).filter(Boolean);
  const wealth=wealthPool.length>0?gR(wealthPool):gR(D.wealth);

  const bgm=gR(D.bgm);
  const flower=gR(D.flower);
  const keywords=gRN(D.keyword,3);
  return {tone,era,family,trait,look,skills,job,sidejob,storyChild,storyMid,storyOld,wealth,bgm,flower,keywords};
}

let picked=false;
function pickCard(idx){
  if(picked)return;
  picked=true;
  chosenTone=idx;
  const cards=document.querySelectorAll('.pick-card');
  cards.forEach((c,i)=>{
    c.classList.add('flipped');
    if(i!==idx)c.classList.add('dim');
    else c.classList.add('chosen');
  });

  setTimeout(()=>{
    // Generate life and start steps
    currentLife=genLife(idx);
    stepData=buildSteps(currentLife);
    document.getElementById('homeView').style.display='none';
    document.getElementById('stepView').style.display='block';
    document.getElementById('resultView').style.display='none';
    showStep(0);
  },800);
}

// ==================== STEP SYSTEM ====================
let currentStep=0;
let isTyping=false;

function showStep(i){
  currentStep=i;
  const card=document.getElementById('stepCard');
  const content=document.getElementById('stepContent');
  const title=document.getElementById('stepTitle');
  const counter=document.getElementById('stepCounter');
  const bar=document.getElementById('stepBar');
  const btn=document.getElementById('nextBtn');

  card.classList.remove('show');
  counter.textContent=`第 ${i+1} / ${stepData.length} 章 · ${stepData[i].icon} ${stepData[i].title.replace(/^.{1,2}\s/,'')}`;
  bar.style.width=((i)/(stepData.length)*100)+'%';
  content.innerHTML='';
  content.className='step-content';

  if(i===stepData.length-1){
    btn.textContent='✨ 查看完整人生档案';
  }else{
    btn.textContent='下一章 →';
  }

  setTimeout(()=>{
    card.classList.add('show');
    // Typewriter effect
    const html=stepData[i].content();
    typeWriter(content,html);
  },300);
}

function typeWriter(el,html){
  isTyping=true;
  el.classList.add('tw-cursor');
  // Strip HTML tags for typing, then insert as HTML
  const temp=document.createElement('div');
  temp.innerHTML=html;
  const fullText=temp.textContent || temp.innerText || '';
  let idx=0;
  el.textContent='';

  function type(){
    if(idx>=fullText.length){
      el.classList.remove('tw-cursor');
      el.innerHTML=html;
      isTyping=false;
      return;
    }
    // Type char by char
    el.textContent=fullText.substring(0,idx+1);
    idx++;
    // Speed variation based on punctuation
    const ch=fullText[idx-1];
    const delay='，。！？；、'.includes(ch)?80:25;
    setTimeout(type,delay);
  }
  setTimeout(type,300);
}

function nextStep(){
  if(isTyping){
    // Skip typing
    const content=document.getElementById('stepContent');
    content.classList.remove('tw-cursor');
    content.innerHTML=stepData[currentStep].content();
    isTyping=false;
    return;
  }
  if(currentStep<stepData.length-1){
    showStep(currentStep+1);
  }else{
    // Show final result
    showResult();
  }
}

    navigator.clipboard.writeText(t).then(()=>showToast('📋 文案已复制，去发朋友圈吧！')).catch(()=>cf(t));
  }else{cf(t)}

function cf(t){
  const ta=document.createElement('textarea');
  ta.value=t;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  document.execCommand('copy');document.body.removeChild(ta);
  showToast('📋 文案已复制，去发朋友圈吧！');
}

// ==================== THEME ====================
function toggleTheme(){
  document.documentElement.classList.toggle('dark');
  const b=document.getElementById('themeToggle');
  b.textContent=document.documentElement.classList.contains('dark')?'☀️':'🌙';
  localStorage.setItem('life-theme',document.documentElement.classList.contains('dark')?'dark':'light');
}
(function(){
  if(localStorage.getItem('life-theme')==='dark'){document.documentElement.classList.add('dark');document.getElementById('themeToggle').textContent='☀️'}
})();

// ==================== TOAST ====================
let tt=null;
function showToast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2500);
}

// ==================== KEYBOARD ====================
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'||e.key===' '){
    const sv=document.getElementById('stepView');
    if(sv.style.display!=='none'&&sv.style.display!==''&&!e.target.matches('input,textarea,button')){e.preventDefault();nextStep()}
  }
});
</script>
