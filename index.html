<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>随机人生模拟器</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fef7f2;--card:rgba(255,255,255,.8);--text:#3d2c2e;--text2:rgba(61,44,46,.5);
  --border:rgba(248,180,217,.2);--glow:rgba(248,180,217,.12);
  --accent:#f8b4d9;--accent2:#b8e6c8;--accent3:#ffd6a5;--btn:#f8b4d9;
  --shadow:0 8px 32px rgba(248,180,217,.12);
  --c1:#f8b4d9;--c2:#b8e6c8;--c3:#ffd6a5;--c4:#c8b0e8;--c5:#f0c080;--c6:#e0b0c0;
}
.dark{
  --bg:#1a1a2e;--card:rgba(30,30,50,.85);--text:#e8e0e8;--text2:rgba(232,224,232,.4);
  --border:rgba(248,180,217,.1);--glow:rgba(248,180,217,.06);
  --accent:#e8a0c0;--accent2:#90c8a0;--accent3:#e0b080;--btn:#e8a0c0;
  --shadow:0 8px 32px rgba(0,0,0,.3);
  --c1:#e8a0c0;--c2:#90c8a0;--c3:#e0b080;--c4:#b090d0;--c5:#d0a060;--c6:#c890a0;
}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .4s,color .4s}
/* ===== PARTICLES ===== */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.pt{position:absolute;border-radius:50%;opacity:0;animation:ptFloat linear infinite}
@keyframes ptFloat{0%{transform:translateY(100vh) scale(0);opacity:0}5%{opacity:.5}90%{opacity:.5}100%{transform:translateY(-10vh) scale(1);opacity:0}}
/* ===== GLOW ===== */
.glow{position:fixed;border-radius:50%;z-index:0;pointer-events:none}
.g1{width:500px;height:500px;top:-15%;left:-10%;background:radial-gradient(circle,var(--glow),transparent 70%);animation:fl1 20s ease-in-out infinite}
.g2{width:400px;height:400px;bottom:-10%;right:-5%;background:radial-gradient(circle,rgba(184,230,200,.08),transparent 70%);animation:fl2 25s ease-in-out infinite}
@keyframes fl1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,-40px)}}
@keyframes fl2{0%,100%{transform:translate(0,0)}50%{transform:translate(-50px,60px)}}
/* ===== LAYOUT ===== */
.ct{position:relative;z-index:1;max-width:580px;margin:0 auto;padding:16px}
/* ===== THEME ===== */
.theme-toggle{position:fixed;top:14px;right:14px;z-index:100;width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;backdrop-filter:blur(8px)}
.theme-toggle:hover{transform:scale(1.1)}.theme-toggle:active{transform:scale(.95)}
/* ===== HOME ===== */
.home{text-align:center;padding:50px 10px;min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.home-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:999px;font-size:11px;font-weight:600;background:rgba(248,180,217,.1);color:var(--accent);letter-spacing:1px;border:1px solid var(--border);margin-bottom:16px}
.home h1{font-size:34px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2;margin-bottom:8px}
.dark .home h1{background:linear-gradient(135deg,#e8a0c0,#90c8a0,#e0b080);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.home .sub{font-size:13px;color:var(--text2);letter-spacing:2px;margin-bottom:40px;line-height:1.8}
.start-btn{width:160px;height:160px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:18px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .3s;box-shadow:0 8px 40px rgba(248,180,217,.2);position:relative;overflow:hidden}
.start-btn::before{content:'';position:absolute;inset:0;border-radius:50%;background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,.2) 50%,transparent 70%);animation:shine 3s ease-in-out infinite}
@keyframes shine{0%,100%{transform:rotate(0deg) translateX(0)}50%{transform:rotate(180deg) translateX(10px)}}
.start-btn:hover{transform:scale(1.05);box-shadow:0 12px 50px rgba(248,180,217,.3)}
.start-btn:active{transform:scale(.93)}
.start-btn .ico{font-size:42px;display:block;margin-bottom:4px}
/* ===== STEP ===== */
.step-view{display:none;padding:10px 0}
.step-hd{margin-bottom:16px}
.step-counter{font-size:10px;color:var(--text2);letter-spacing:3px;margin-bottom:4px}
.step-bar{height:3px;border-radius:2px;background:var(--border);overflow:hidden;margin-bottom:4px}
.step-bar-in{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .6s ease;width:0%}
.step-chapter{font-size:12px;color:var(--accent);letter-spacing:2px;font-weight:600}
.step-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px 20px;backdrop-filter:blur(12px);box-shadow:var(--shadow);opacity:0;transform:translateY(15px);transition:opacity .4s,transform .4s,background .4s;min-height:300px}
.step-card.show{opacity:1;transform:translateY(0)}
.step-scene{font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:14px;padding:12px 14px;border-radius:10px;background:rgba(0,0,0,.02);border-left:3px solid var(--accent);font-style:italic}
.dark .step-scene{background:rgba(255,255,255,.02)}
.step-q{font-size:16px;font-weight:700;margin-bottom:14px;line-height:1.5;letter-spacing:.5px}
/* ===== CHOICES ===== */
.choices{display:flex;flex-direction:column;gap:8px}
.choice{width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,.02);font-size:13px;color:var(--text);cursor:pointer;text-align:left;font-family:inherit;transition:all .25s;line-height:1.5;position:relative;overflow:hidden}
.choice:hover{border-color:var(--accent);background:rgba(248,180,217,.04);transform:translateX(4px)}
.choice:active{transform:scale(.98)}
.choice .ch-icon{font-size:18px;margin-right:8px}
.choice .ch-label{font-weight:600}
.choice .ch-desc{font-size:11px;color:var(--text2);margin-top:2px;margin-left:28px}
.choice.picked{border-color:var(--accent);background:rgba(248,180,217,.08)}
.choice.picked::after{content:'✓';position:absolute;top:50%;right:14px;transform:translateY(-50%);color:var(--accent);font-weight:700;font-size:16px}
.choice.disabled{pointer-events:none;opacity:.5}
.choice.result-mode{border-color:var(--accent2);background:rgba(184,230,200,.06);pointer-events:none;transform:none}
.choice.result-mode::after{content:'→';position:absolute;top:50%;right:14px;transform:translateY(-50%);color:var(--accent2);font-size:18px}
/* ===== RESULT ===== */
.result-view{display:none}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:24px 20px;backdrop-filter:blur(12px);box-shadow:var(--shadow);overflow:hidden;opacity:0;transform:translateY(20px);transition:opacity .5s,transform .5s,background .4s}
.result-card.show{opacity:1;transform:translateY(0)}
.result-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--c1),var(--c2),var(--c3),var(--c4),var(--c5))}
.rh{text-align:center;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.rh-ico{font-size:40px;display:block;margin-bottom:6px}
.rh-t{font-size:17px;font-weight:800;letter-spacing:1px}
.rh-st{font-size:11px;color:var(--text2);margin-top:3px;letter-spacing:1px}
.sec{margin-bottom:16px}.sec:last-child{margin-bottom:0}
.sh{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.sh .si{font-size:15px}.sh .st{font-size:13px;font-weight:700}
.sh .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.sb{font-size:13px;line-height:1.8}
.sb .hl{color:var(--accent);font-weight:600}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500;background:rgba(248,180,217,.1);color:var(--accent);border:1px solid var(--border)}
.tag.gr{background:rgba(184,230,200,.1);color:var(--accent2)}
.story{padding:8px 12px;border-radius:8px;margin-bottom:5px;border-left:3px solid;font-size:12px;line-height:1.6}
.story.g{border-color:var(--accent2);background:rgba(184,230,200,.04)}
.story.n{border-color:var(--accent3);background:rgba(255,214,165,.04)}
.story.r{border-color:var(--accent);background:rgba(248,180,217,.04)}
.story .sb2{font-size:9px;font-weight:600;letter-spacing:1px;margin-bottom:2px;display:block}
.story.g .sb2{color:var(--accent2)}.story.n .sb2{color:var(--accent3)}.story.r .sb2{color:var(--accent)}
.fb{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;background:rgba(248,180,217,.08);border:1px solid var(--border)}
.fi{font-size:24px;flex-shrink:0}.fl{font-size:14px;font-weight:700}.fd{font-size:11px;color:var(--text2);margin-top:1px}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.mi{padding:8px 10px;border-radius:8px;border:1px solid var(--border);text-align:center}
.mi .ml{font-size:9px;color:var(--text2);letter-spacing:1px;margin-bottom:2px}
.mi .mv{font-size:12px;font-weight:600}
.actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn{padding:11px 16px;border-radius:11px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;flex:1}
.btn:active{transform:scale(.96)}
.bp{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.bs{background:rgba(248,180,217,.08);color:var(--text);border:1px solid var(--border)}
.bc{background:rgba(184,230,200,.12);color:var(--accent2);border:1px solid rgba(184,230,200,.15)}
/* ===== TOAST ===== */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 20px;border-radius:10px;background:var(--card);border:1px solid var(--border);font-size:13px;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.1);z-index:999;opacity:0;transition:all .4s;backdrop-filter:blur(12px);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* ===== FOOTER ===== */
.ft{text-align:center;padding:20px 0 5px;font-size:9px;color:var(--text2);letter-spacing:1px;position:relative;z-index:1}
/* ===== RESPONSIVE ===== */
@media(max-width:480px){
  .home h1{font-size:27px}
  .start-btn{width:140px;height:140px;font-size:16px}
  .start-btn .ico{font-size:36px}
  .step-card{padding:20px 16px;border-radius:16px}
  .result-card{padding:18px 14px;border-radius:16px}
  .mg{grid-template-columns:1fr}
  .actions{flex-direction:column}
  .theme-toggle{top:10px;right:10px;width:34px;height:34px;font-size:15px}
  .choice{padding:12px 14px;font-size:12px}
}
</style>
</head>
<body>

<div class="glow g1"></div>

<div id="particles"></div>

<button class="theme-toggle" id="themeToggle" onclick="tt()">🌙</button>

<div class="ct" id="app">

  <!-- HOME -->
  <div id="homeView" class="home">

  <!-- STEP -->

    <div class="actions">

// ===== GAME STATE =====
let state={step:0,picked:{},life:{},chosen:[]};

function startGame(){
  state={step:0,picked:{},life:{},chosen:[]};
  document.getElementById('homeView').style.display='none';
  document.getElementById('stepView').style.display='block';
  document.getElementById('resultView').style.display='none';
  renderStep(0);
}

function renderStep(i){
  const s=STEPS[i];
  const card=document.getElementById('stepCard');
  const scene=document.getElementById('stepScene');
  const q=document.getElementById('stepQ');
  const choices=document.getElementById('choices');
  const counter=document.getElementById('stepCounter');
  const bar=document.getElementById('stepBar');
  const ch=document.getElementById('stepChapter');

  card.classList.remove('show');
  counter.textContent=`第 ${i+1} / ${STEPS.length} 章`;
  bar.style.width=(i/STEPS.length*100)+'%';
  ch.textContent=s.ch;

  setTimeout(()=>{
    // Typewriter for scene
    scene.textContent='';
    q.textContent='';
    choices.innerHTML='';

    card.classList.add('show');
    typeScene(scene,s.scene,()=>{
      typeScene(q,s.q,()=>{
        renderChoices(choices,s.opts,i);
      });
    });
  },400);
}

function typeScene(el,text,cb){
  let idx=0;
  el.textContent='';
  function t(){
    if(idx>=text.length){if(cb)setTimeout(cb,200);return}
    el.textContent+=text[idx];
    idx++;
    const d='，。！？；、：'.includes(text[idx-1])?40:12;
    setTimeout(t,d);
  }
  setTimeout(t,200);
}

function renderChoices(container,opts,stepIdx){
  container.innerHTML='';
  opts.forEach((o,i)=>{
    const div=document.createElement('button');
    div.className='choice';
    div.innerHTML=`<span class="ch-icon">${o.ico}</span><span class="ch-label">${o.label}</span><div class="ch-desc">${o.desc}</div>`;
    div.onclick=()=>pickChoice(stepIdx,i);
    container.appendChild(div);
  });
}

function pickChoice(stepIdx,optIdx){
  const s=STEPS[stepIdx];
  const opt=s.opts[optIdx];
  const btns=document.querySelectorAll('.choice');

  // Disable all, highlight picked
  btns.forEach((b,i)=>{
    b.classList.add('disabled');
    if(i===optIdx){
      b.classList.remove('disabled');
      b.classList.add('picked');
    }
  });

  // Save choice
  state.picked[stepIdx]=optIdx;
  state.chosen.push({step:s.id,choice:optIdx});

  // Apply effects
  const r=opt.r;
  if(r.era)state.life.era=r.era;
  if(r.family)state.life.family=r.family;
  if(r.trait)state.life.trait=r.trait;
  if(r.look)state.life.look=r.look;
  if(r.era_extra)state.life.era_extra=r.era_extra;
  if(r.storyChild)state.life.storyChild=r.storyChild;
  if(r.storyMid)state.life.storyMid=r.storyMid;
  if(r.storyOld)state.life.storyOld=r.storyOld;
  if(r.keywords)state.life.keywords=r.keywords;
  if(r.job)state.life.job=r.job;
  if(r.wealthBias)state.life.wealthBias=r.wealthBias;
  if(r.wealthMod)state.life.wealthMod=r.wealthMod;
  if(r.skillPool)state.life.skillPool=r.skillPool;
  if(r.sidePool)state.life.sidePool=r.sidePool;

  // Transition
  setTimeout(()=>{
    if(stepIdx<STEPS.length-1){
      renderStep(stepIdx+1);
    }else{
      finishLife();
    }
  },600);
}

function finishLife(){
  const l=state.life;

  // Fill in missing fields
  if(!l.era)l.era={l:'90后',e:'🌸'};
  if(!l.family)l.family='普通工薪家庭，但充满爱';
  if(!l.trait)l.trait='温暖善良，懂得感恩';
  if(!l.look)l.look=gR(['清秀耐看','笑容有感染力','文艺气质','斯文学霸','可爱挂','温柔系']);

  // Skills based on pool
  const poolMap={
    brain:L.skill.filter(s=>['数学思维很强','逻辑推理一流','学语言很快','记忆力超群','编程天赋','写作能力强','投资嗅觉敏锐'].includes(s.n)),
    social:L.skill.filter(s=>['共情能力极强','自来熟聊得来','组织策划强','领导力天生','讲故事吸引人'].includes(s.n)),
    art:L.skill.filter(s=>['钢琴十级','油画天赋','街舞达人','书法出神入化','摄影感一流','陶艺做得很好','唱歌很好听','即兴表演天赋','设计审美很绝'].includes(s.n)),
    office:L.skill.filter(s=>['数学思维很强','逻辑推理一流','编程天赋','写作能力强','投资嗅觉敏锐','时间管理大师'].includes(s.n)),
    creative:L.skill.filter(s=>['钢琴十级','油画天赋','摄影感一流','陶艺做得很好','唱歌很好听','设计审美很绝','烘焙达人','插花审美很好'].includes(s.n)),
    entrepreneur:L.skill.filter(s=>['领导力天生','投资嗅觉敏锐','自来熟聊得来','组织策划强','讲故事吸引人','治愈系能量','时间管理大师'].includes(s.n))
  };
  const pool=l.skillPool?poolMap[l.skillPool]||[]:[];
  l.skills=pool.length>=3?gRN(pool,3):gRN(L.skill,3);

  // Side job based on pool
  const sideMap={
    office:['兼职翻译','宠物美容师','花艺工作室','二手书店店主','冥想导师','手账设计师'],
    creative:['兼职插画师','塔罗牌占卜师','探店博主','网文写手','跟拍摄影师','手工饰品店主','Vlog博主'],
    entrepreneur:['剧本杀DM','民宿合伙人','脱口秀演员','露营领队','占星师','改娃师']
  };
  const sp=sideMap[l.sidePool]||L.side;
  l.sidejob=gR(sp);

  // Wealth based on bias + mod
  const wealthMap={
    stable:[
      {ico:'💵',l:'小康级',d:'吃喝不愁，有少量存款，一年能旅游一两次。小日子挺滋润。'},
      {ico:'💰',l:'富裕级',d:'有房有车有存款，偶尔奢侈一下也不心疼。'},
      {ico:'🧘',l:'知足级',d:'钱够用但不是很多，但心态很好。钱买不来快乐，而你恰好很懂快乐。'},
      {ico:'🌱',l:'积累级',d:'年轻时穷过，但越老越有钱。一辈子都在稳步上升，晚年反而最宽裕。'}
    ],
    passion:[
      {ico:'🧘',l:'知足级',d:'钱够用但不是很多，但心态很好。钱买不来快乐，而你恰好很懂快乐。'},
      {ico:'🌈',l:'幸运级',d:'总能在对的时间遇到对的机会。钱会自己找上门来。'},
      {ico:'💸',l:'随缘级',d:'钱嘛来了就花没了再挣。虽然不是大富大贵的命，但总有人愿意帮你。'},
      {ico:'🤑',l:'财富自由级',d:'把热爱做到了极致，钱自然就来了。晚年成了传奇人物。'}
    ],
    biz:[
      {ico:'🌊',l:'起伏级',d:'一生财运大起大落，赚过大钱也亏过。但经历比钱值钱。'},
      {ico:'🏦',l:'隐形富豪级',d:'看着不显山露水，其实存款比谁都多。低调过日子，遇事从不缺钱。'},
      {ico:'🤑',l:'财富自由级',d:'钱不是问题，问题是钱太多不知道怎么花。投资眼光毒辣。'},
      {ico:'🎰',l:'偏财级',d:'正经上班挣不多，但偏财运极好——中奖、红包、意外之财不断。'}
    ]
  };
  const wp=wealthMap[l.wealthBias]||wealthMap.stable;
  let w=gR(wp);
  if(l.wealthMod&&Math.random()<.3){
    // Shift wealth up or down based on mod
    const idx=wp.indexOf(w);
    if(l.wealthMod>1&&idx<wp.length-1)w=wp[idx+1];
    if(l.wealthMod<1&&idx>0)w=wp[Math.max(0,idx-1)];
  }
  l.wealth=w;

  // Random misc
  l.bgm=gR(L.bgm);
  l.flower=gR(L.flower);
  if(!l.keywords)l.keywords=gRN(L.keyword,3);

  // Story fallbacks
  if(!l.storyChild)l.storyChild={type:'good',t:'平平淡淡但也有小确幸的童年'};
  if(!l.storyMid)l.storyMid={type:'good',t:'生活没有大起大落，但也算安稳顺遂'};
  if(!l.storyOld)l.storyOld={type:'good',t:'你过完了平凡但温暖的一生'};

  // Determine overall tone emoji
  const types=[l.storyChild.type,l.storyMid.type,l.storyOld.type];
  const goodCount=types.filter(t=>t==='good').length;
  const roughCount=types.filter(t=>t==='rough').length;
  let toneEmoji,toneName;
  if(goodCount>=2){toneEmoji='🌤️';toneName='温暖晴朗的一生'}
  else if(roughCount>=2){toneEmoji='🌊';toneName='波澜壮阔的一生'}
  else{toneEmoji='🌿';toneName='平实温暖的一生'}

  l.toneEmoji=toneEmoji;
  l.toneName=toneName;

  // Show result
  document.getElementById('stepView').style.display='none';
  document.getElementById('resultView').style.display='block';
  showResult(l);
}

      <span class="rh-ico">${l.toneEmoji}</span>

// ===== SCREENSHOT =====
function cap(){
  const el=document.getElementById('capture-area');
  if(!el)return;
  html2canvas(el,{
    backgroundColor:getComputedStyle(document.body).backgroundColor||'#fef7f2',
    scale:2,useCORS:true,logging:false
  }).then(c=>{
    const a=document.createElement('a');
    a.download='随机人生_'+(state.life.toneName||'')+'.png';
    a.href=c.toDataURL('image/png');a.click();
    st('📸 截图已保存');
  }).catch(()=>st('截图失败请手动截图'));
}

// ===== COPY SHARE =====
function cp(){
  const l=state.life;
  if(!l){st('请先完成人生模拟');return}
  const t=`🎭 我过完了这样的一生——

📋 ${l.era.l}${l.era.e} · ${l.family}
😌 ${l.trait} · ${l.look}

🎯 天赋：${l.skills.map(s=>s.n).join('、')}

💼 主业：${l.job} · 副业：${l.sidejob}

📖 ${l.storyChild.t}

💰 财运：${l.wealth.l}

🌸 ${l.flower} · 🎵 ${l.bgm}
✨ ${l.keywords.join(' · ')}

—— 来选你的人生 👇`;

  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(()=>st('📋 已复制，去发朋友圈吧！')).catch(()=>cf(t));
  }else{cf(t)}
}
function cf(t){
  const e=document.createElement('textarea');
  e.value=t;e.style.position='fixed';e.style.opacity='0';
  document.body.appendChild(e);e.select();
  document.execCommand('copy');document.body.removeChild(e);
  st('📋 已复制，去发朋友圈吧！');
}

// ===== THEME =====
function tt(){
  document.documentElement.classList.toggle('dark');
  const b=document.getElementById('themeToggle');
  b.textContent=document.documentElement.classList.contains('dark')?'☀️':'🌙';
  localStorage.setItem('lt',document.documentElement.classList.contains('dark')?'d':'l');
}
(function(){
  if(localStorage.getItem('lt')==='d'){document.documentElement.classList.add('dark');document.getElementById('themeToggle').textContent='☀️'}
})();

// ===== TOAST =====
let ttm=null;
function st(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  clearTimeout(ttm);ttm=setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
