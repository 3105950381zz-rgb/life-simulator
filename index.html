<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>随机人生模拟器</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fef7f2;--card:rgba(255,255,255,.75);--text:#3d2c2e;--text2:rgba(61,44,46,.5);
  --border:rgba(248,180,217,.25);--glow1:rgba(248,180,217,.15);--glow2:rgba(184,230,200,.15);
  --accent:#f8b4d9;--accent2:#b8e6c8;--accent3:#ffd6a5;--btn:#f8b4d9;--btn-hover:#f09bc8;
  --shadow:0 8px 32px rgba(248,180,217,.15);--tag-bg:rgba(248,180,217,.1);
}
.dark{
  --bg:#1a1a2e;--card:rgba(30,30,50,.8);--text:#e8e0e8;--text2:rgba(232,224,232,.4);
  --border:rgba(248,180,217,.12);--glow1:rgba(248,180,217,.08);--glow2:rgba(184,230,200,.08);
  --accent:#e8a0c0;--accent2:#90c8a0;--accent3:#e0b080;--btn:#e8a0c0;--btn-hover:#d090b0;
  --shadow:0 8px 32px rgba(0,0,0,.3);--tag-bg:rgba(232,160,192,.1);
}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .4s,color .4s}
/* ===== PARTICLES ===== */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.pt{position:absolute;border-radius:50%;opacity:0;animation:ptFloat linear infinite}
@keyframes ptFloat{0%{transform:translateY(100vh) scale(0);opacity:0}5%{opacity:.6}90%{opacity:.6}100%{transform:translateY(-10vh) scale(1);opacity:0}}
/* ===== GLOW ===== */
.glow{position:fixed;border-radius:50%;z-index:0;pointer-events:none;transition:background .4s}
.g1{width:500px;height:500px;top:-15%;left:-10%;background:radial-gradient(circle,var(--glow1),transparent 70%);animation:float1 20s ease-in-out infinite}
.g2{width:400px;height:400px;bottom:-10%;right:-5%;background:radial-gradient(circle,var(--glow2),transparent 70%);animation:float2 25s ease-in-out infinite}
.g3{width:300px;height:300px;top:40%;right:-5%;background:radial-gradient(circle,rgba(255,214,165,.08),transparent 70%);animation:float3 15s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,-40px)}}
@keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-50px,60px)}}
@keyframes float3{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,30px)}}
/* ===== LAYOUT ===== */
.ct{position:relative;z-index:1;max-width:580px;margin:0 auto;padding:20px 16px 40px}
/* ===== HEADER ===== */
.hd{text-align:center;padding:40px 0 10px;position:relative}
.hd-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:999px;font-size:11px;font-weight:600;background:var(--tag-bg);color:var(--accent);letter-spacing:1px;border:1px solid var(--border);margin-bottom:14px}
.hd h1{font-size:36px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2}
.dark .hd h1{background:linear-gradient(135deg,#e8a0c0,#90c8a0,#e0b080);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd p{font-size:14px;color:var(--text2);margin-top:6px;letter-spacing:2px}
/* ===== THEME TOGGLE ===== */
.theme-toggle{position:fixed;top:16px;right:16px;z-index:100;width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;backdrop-filter:blur(8px)}
.theme-toggle:hover{transform:scale(1.1)}.theme-toggle:active{transform:scale(.95)}
/* ===== DRAW BUTTON ===== */
.draw-wrap{text-align:center;padding:50px 0 20px}
.draw-btn{width:200px;height:200px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:20px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .3s;box-shadow:0 8px 40px rgba(248,180,217,.25);position:relative;overflow:hidden}
.draw-btn::before{content:'';position:absolute;inset:0;border-radius:50%;background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,.2) 50%,transparent 70%);animation:btnShine 3s ease-in-out infinite}
@keyframes btnShine{0%,100%{transform:rotate(0deg) translateX(0)}50%{transform:rotate(180deg) translateX(10px)}}
.draw-btn:hover{transform:scale(1.05);box-shadow:0 12px 50px rgba(248,180,217,.35)}
.draw-btn:active{transform:scale(.95)}
.draw-btn .icon{font-size:48px;display:block;margin-bottom:6px}
/* ===== DRAWING ANIMATION ===== */
.draw-btn.loading{animation:btnPulse .8s ease-in-out infinite;pointer-events:none}
@keyframes btnPulse{0%,100%{transform:scale(1)}50%{transform:scale(.95)}}
/* ===== CARD ===== */
.card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:28px 24px;margin-top:16px;backdrop-filter:blur(12px);box-shadow:var(--shadow);position:relative;overflow:hidden;opacity:0;transform:translateY(20px);transition:opacity .5s,transform .5s,background .4s}
.card.show{opacity:1;transform:translateY(0)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3))}
/* ===== SECTION ===== */
.sec{margin-bottom:20px;animation:secFade .5s ease forwards;opacity:0}
.sec:nth-child(1){animation-delay:.1s}.sec:nth-child(2){animation-delay:.2s}.sec:nth-child(3){animation-delay:.3s}.sec:nth-child(4){animation-delay:.4s}.sec:nth-child(5){animation-delay:.5s}.sec:nth-child(6){animation-delay:.6s}
@keyframes secFade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sec-hd .ico{font-size:18px}
.sec-hd .tt{font-size:14px;font-weight:700;color:var(--text);letter-spacing:1px}
.sec-hd .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.sec-body{font-size:14px;line-height:1.8;color:var(--text)}
.sec-body .hl{color:var(--accent);font-weight:600}
/* ===== TAG ===== */
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{padding:4px 12px;border-radius:999px;font-size:12px;font-weight:500;background:var(--tag-bg);color:var(--accent);border:1px solid var(--border)}
.tag.green{background:rgba(184,230,200,.1);color:var(--accent2)}
.tag.orange{background:rgba(255,214,165,.1);color:var(--accent3)}
/* ===== STORY ===== */
.story{padding:12px 14px;border-radius:12px;margin-bottom:8px;border-left:3px solid;font-size:13px;line-height:1.7;position:relative}
.story.good{border-color:var(--accent2);background:rgba(184,230,200,.04)}
.story.normal{border-color:var(--accent3);background:rgba(255,214,165,.04)}
.story.rough{border-color:var(--accent);background:rgba(248,180,217,.04)}
.story .s-badge{font-size:10px;font-weight:600;letter-spacing:1px;margin-bottom:4px;display:block}
.story.good .s-badge{color:var(--accent2)}
.story.normal .s-badge{color:var(--accent3)}
.story.rough .s-badge{color:var(--accent)}
/* ===== FORTUNE ===== */
.fortune-box{display:flex;align-items:center;gap:16px;padding:14px 16px;border-radius:14px;background:var(--tag-bg);border:1px solid var(--border)}
.fortune-icon{font-size:36px;flex-shrink:0}
.fortune-info{flex:1}
.fortune-level{font-size:16px;font-weight:700}
.fortune-desc{font-size:12px;color:var(--text2);margin-top:2px}
/* ===== MISC ===== */
.misc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.misc-item{padding:10px 12px;border-radius:10px;border:1px solid var(--border);text-align:center}
.misc-item .mi-label{font-size:10px;color:var(--text2);letter-spacing:1px;margin-bottom:4px}
.misc-item .mi-value{font-size:14px;font-weight:600}
/* ===== BUTTONS ===== */
.actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.btn{padding:12px 20px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;flex:1;min-width:0}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 16px rgba(248,180,217,.2)}
.btn-primary:hover{box-shadow:0 6px 24px rgba(248,180,217,.3)}
.btn-second{background:var(--tag-bg);color:var(--text);border:1px solid var(--border)}
.btn-second:hover{background:var(--border)}
.btn-copy{background:rgba(184,230,200,.15);color:var(--accent2);border:1px solid rgba(184,230,200,.2)}
.btn-copy:hover{background:rgba(184,230,200,.25)}
/* ===== TOAST ===== */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);padding:12px 24px;border-radius:12px;background:var(--card);border:1px solid var(--border);font-size:13px;font-weight:500;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.1);z-index:999;opacity:0;transition:all .4s;backdrop-filter:blur(12px);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* ===== TYPEWRITER ===== */
.tw-cursor::after{content:'|';animation:twBlink .8s step-end infinite;color:var(--accent);font-weight:300}
@keyframes twBlink{0%,100%{opacity:1}50%{opacity:0}}
/* ===== FOOTER ===== */
.ft{text-align:center;padding:30px 0 10px;font-size:10px;color:var(--text2);letter-spacing:1px;line-height:1.8}
.ft a{color:var(--accent);text-decoration:none}
/* ===== RESPONSIVE ===== */
@media(max-width:480px){
  .hd h1{font-size:28px}
  .draw-btn{width:160px;height:160px;font-size:17px}
  .draw-btn .icon{font-size:40px}
  .card{padding:20px 16px;border-radius:18px}
  .misc-grid{grid-template-columns:1fr}
  .actions{flex-direction:column}
  .theme-toggle{top:12px;right:12px;width:36px;height:36px;font-size:16px}
}
/* ===== DRAW SHAKE ===== */
@keyframes cardShake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-4px)}20%,40%,60%,80%{transform:translateX(4px)}}
.card.shake{animation:cardShake .4s}
/* ===== SCREENSHOT AREA ===== */
#capture-area{width:100%}
</style>
</head>

  <!-- HOME -->

  <!-- RESULT -->

    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="drawLife()">🔄 重新抽取</button>

      <button class="btn btn-copy" onclick="copyShare()">📋 复制文案</button>

<div class="toast" id="toast"></div>

// ==================== GENERATE LIFE ====================
function genLife(){
  const era=gR(DATA.era);
  const family=gR(DATA.family);
  const personality=gR(DATA.personality);
  const look=gR(DATA.look);
  const skills=gRN(DATA.skill,3);
  const job=gR(DATA.job);
  const sidejob=gR(DATA.sidejob);
  const storyChild=gR(DATA.storyChild);
  const storyMid=gR(DATA.storyMid);
  const storyOld=gR(DATA.storyOld);
  const wealth=gR(DATA.wealth);
  const bgm=gR(DATA.bgm);
  const flower=gR(DATA.flower);
  const keywords=gRN(DATA.keyword,3);
  return {era,family,personality,look,skills,job,sidejob,storyChild,storyMid,storyOld,wealth,bgm,flower,keywords};
}

// ==================== RENDER ====================

    <div class="sec">
      <div class="sec-hd"><span class="ico">📋</span><span class="tt">专属身份</span><span class="ln"></span></div>
      <div class="sec-body">
        <span class="hl">${life.era.label}${life.era.emoji}</span> · ${life.family}<br>
        性格：<span class="hl">${life.personality}</span> · 外貌：${life.look}

// ==================== DRAW ====================
function drawLife(){
  const btn=document.getElementById('drawBtn');
  const home=document.getElementById('homeView');
  const result=document.getElementById('resultView');
  const card=document.getElementById('resultCard');
  const capture=document.getElementById('capture-area');

  btn.classList.add('loading');
  btn.innerHTML='<span class="icon">🌀</span>正在生成...';

  setTimeout(()=>{
    const life=genLife();
    currentLife=life;
    renderLife(life);

    home.style.display='none';
    result.style.display='block';
    capture.style.width='';

    // shake animation
    card.classList.remove('show','shake');
    void card.offsetWidth;
    card.classList.add('shake');
    setTimeout(()=>{
      card.classList.remove('shake');
      card.classList.add('show');
    },400);

    btn.classList.remove('loading');
    btn.innerHTML='<span class="icon">🎲</span>抽取全新人生';

    // scroll to result
    setTimeout(()=>{
      result.scrollIntoView({behavior:'smooth',block:'start'});
    },500);
  },1200);
}

// ==================== SCREENSHOT ====================
function captureCard(){
  const el=document.getElementById('capture-area');
  if(!el)return;
  // get computed bg color
  const bg=getComputedStyle(document.body).getPropertyValue('--bg').trim();
  const parseBg = window.getComputedStyle(document.body).backgroundColor;

  html2canvas(el,{
    backgroundColor: parseBg,
    scale:2,
    useCORS:true,
    logging:false
  }).then(function(canvas){
    const link=document.createElement('a');
    link.download='随机人生_'+(currentLife?currentLife.era.label:'')+'.png';
    link.href=canvas.toDataURL('image/png');
    link.click();
    showToast('📸 截图已保存');
  }).catch(function(){
    showToast('截图失败，请尝试手动截图');
  });
}

// ==================== SHARE COPY ====================
function copyShare(){
  if(!currentLife){showToast('请先抽取人生');return}
  const l=currentLife;
  const text=`🎲 我抽到了这样一个人生——

📋 ${l.era.label} · ${l.family}
性格：${l.personality} · 外貌：${l.look}

🎯 天赋：${l.skills.map(s=>s.name).join('、')}

💼 主业：${l.job} ｜ 副业：${l.sidejob}

📖 ${l.storyChild.text}

💰 财运：${l.wealth.level}

🌸 代表花：${l.flower} · BGM：${l.bgm}
关键词：${l.keywords.join(' · ')}

—— 随机人生模拟器 · 你也来抽一次？`;

  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showToast('📋 文案已复制，去发朋友圈吧！')).catch(()=>copyFallback(text));
  }else{copyFallback(text)}
}

function copyFallback(text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  document.execCommand('copy');document.body.removeChild(ta);
  showToast('📋 文案已复制，去发朋友圈吧！');
}

// ==================== THEME ====================
function toggleTheme(){
  document.documentElement.classList.toggle('dark');
  const btn=document.getElementById('themeToggle');
  const isDark=document.documentElement.classList.contains('dark');
  localStorage.setItem('life-theme',isDark?'dark':'light');
  btn.textContent=isDark?'☀️':'🌙';
}
// load saved theme
(function(){
  const saved=localStorage.getItem('life-theme');
  if(saved==='dark'){document.documentElement.classList.add('dark');document.getElementById('themeToggle').textContent='☀️'}
})();

// ==================== TOAST ====================
let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

// ==================== KEYBOARD SHORTCUT ====================
document.addEventListener('keydown',function(e){
  if(e.key===' '&&!e.target.matches('input,textarea,button')){e.preventDefault();drawLife()}
});
